<div class="auth-layout">
  <div class="auth-card">
    <div class="brand"><h3>Smart List</h3></div>
    
    <h2>{{ isLoginMode ? 'Bem-vindo de volta' : 'Criar nova conta' }}</h2>
    <p class="subtitle">
      {{ isLoginMode ? 'Acesse suas listas de compras' : 'Comece a organizar seu orçamento' }}
    </p>

    <!-- Formulário Estável -->
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="seu@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <!-- Bloco de erro em vez de colorir as bordas -->
      <div class="error-msg" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary auth-btn" [disabled]="isLoading || !email || !password">
        {{ isLoading ? 'Aguarde...' : (isLoginMode ? 'Entrar' : 'Cadastrar') }}
      </button>
    </form>

    <div class="auth-footer">
      <span class="toggle-text">
        {{ isLoginMode ? 'Não tem uma conta?' : 'Já possui uma conta?' }}
      </span>
      <button class="btn-toggle" (click)="toggleMode()" type="button">
        {{ isLoginMode ? 'Cadastre-se' : 'Faça Login' }}
      </button>
    </div>
  </div>
</div>
